services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kinochi_bot
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./temp:/app/temp
      - ./backups:/app/backups
      - ./public_previews:/app/public_previews
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: kinochi_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: