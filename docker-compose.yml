services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram_bot_api
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - bot_api_data:/var/lib/telegram-bot-api
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kinochi_bot
    env_file:
      - .env
    depends_on:
      - db
      - telegram-bot-api
    volumes:
      - ./temp:/app/temp
      - ./backups:/app/backups
      - ./public_previews:/app/public_previews
      - bot_api_data:/var/lib/telegram-bot-api   # bot-api bilan bir xil papkani ko'radi
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: kinochi_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  bot_api_data: